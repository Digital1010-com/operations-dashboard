<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mission Control — Get Started</title>
  <style>
    :root {
      --bg: #f3f6fa;
      --panel: #ffffff;
      --text: #121826;
      --muted: #5b6473;
      --accent: #2f6ea4;
      --border: #d8e0ea;
      --error: #c62828;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "SF Pro Text", "Segoe UI", -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--text);
      background: linear-gradient(160deg, #f7fafc, #ebf1f8);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .shell {
      width: min(480px, 100%);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 32px;
      box-shadow: 0 16px 40px rgba(18, 24, 38, 0.08);
    }
    h1 {
      margin: 0;
      font-size: 22px;
      letter-spacing: -0.02em;
      text-align: center;
    }
    .subtitle {
      margin: 8px 0 24px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
      text-align: center;
    }

    /* Social buttons */
    .social-buttons {
      display: grid;
      gap: 10px;
      margin-bottom: 20px;
    }
    .social-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 11px;
      padding: 12px 14px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      background: #fff;
      color: var(--text);
      transition: background 0.15s, border-color 0.15s, box-shadow 0.15s;
      text-decoration: none;
    }
    .social-btn:hover {
      background: #f8fafc;
      border-color: #b8c4d4;
      box-shadow: 0 2px 8px rgba(18, 24, 38, 0.06);
    }
    .social-btn svg {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 14px;
      margin: 4px 0 20px;
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    form {
      display: grid;
      gap: 12px;
    }
    label {
      font-size: 12px;
      color: var(--muted);
      font-weight: 600;
      margin-bottom: 4px;
      display: block;
    }
    input, select {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 11px;
      padding: 11px 12px;
      font-size: 14px;
      background: #fff;
      color: var(--text);
      outline: none;
    }
    input:focus, select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(47, 110, 164, 0.15);
    }
    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .btn {
      margin-top: 6px;
      border: 0;
      border-radius: 11px;
      padding: 12px 14px;
      background: var(--accent);
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn[disabled] {
      opacity: 0.7;
      cursor: wait;
    }
    .meta {
      margin-top: 18px;
      font-size: 12px;
      color: var(--muted);
      text-align: center;
    }
    .meta a {
      color: var(--accent);
      text-decoration: none;
    }
    .error {
      margin-top: 10px;
      color: var(--error);
      font-size: 13px;
      min-height: 18px;
      text-align: center;
    }
    .ok {
      color: #18794e;
      font-size: 13px;
      min-height: 18px;
      margin-top: 10px;
      text-align: center;
    }
    @media (max-width: 520px) {
      .row { grid-template-columns: 1fr; }
      .shell { padding: 22px; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <h1>Get started with Mission Control</h1>
    <p class="subtitle">Create your workspace in seconds. No credit card required.</p>

    <!-- Social Sign-In Buttons -->
    <div class="social-buttons">
      <a href="/api/auth/google" class="social-btn" id="googleBtn">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18A10.96 10.96 0 0 0 1 12c0 1.77.42 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        Continue with Google
      </a>
      <a href="/api/auth/linkedin" class="social-btn" id="linkedinBtn">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z" fill="#0A66C2"/></svg>
        Continue with LinkedIn
      </a>
    </div>

    <div class="divider">or sign up with email</div>

    <form id="signupForm">
      <div>
        <label for="organizationName">Organization name</label>
        <input id="organizationName" required minlength="2" placeholder="Acme Studio" />
      </div>
      <div class="row">
        <div>
          <label for="fullName">Full name</label>
          <input id="fullName" required minlength="2" placeholder="Alex Smith" />
        </div>
        <div>
          <label for="email">Work email</label>
          <input id="email" required type="email" placeholder="alex@acme.com" />
        </div>
      </div>
      <div class="row">
        <div>
          <label for="password">Password</label>
          <input id="password" required minlength="10" type="password" placeholder="Min 10 characters" />
        </div>
        <div>
          <label for="plan">Plan</label>
          <select id="plan">
            <option value="standard">Standard</option>
            <option value="premium">Premium</option>
          </select>
        </div>
      </div>
      <button id="submitBtn" class="btn" type="submit">Create workspace</button>
      <div id="error" class="error"></div>
      <div id="ok" class="ok"></div>
    </form>

    <div class="meta">Already have an account? <a href="/">Sign in</a></div>
  </div>

  <script>
    // Show error from social auth redirect (e.g. /signup?error=...)
    (function() {
      const params = new URLSearchParams(window.location.search);
      const err = params.get('error');
      if (err) {
        const messages = {
          invalid_state: 'Session expired. Please try again.',
          missing_code: 'Authorization was not completed.',
          token_exchange_failed: 'Could not verify your account. Please try again.',
          no_email: 'We need your email address to create an account.',
          google_signin_failed: 'Google sign-in failed. Please try again.',
          linkedin_signin_failed: 'LinkedIn sign-in failed. Please try again.',
          user_cancelled_authorize: 'Sign-in was cancelled.'
        };
        document.getElementById('error').textContent = messages[err] || err.replace(/_/g, ' ');
        // Clean URL
        params.delete('error');
        const next = params.toString() ? `?${params.toString()}` : window.location.pathname;
        window.history.replaceState({}, '', next);
      }
    })();

    const form = document.getElementById('signupForm');
    const errorEl = document.getElementById('error');
    const okEl = document.getElementById('ok');
    const submitBtn = document.getElementById('submitBtn');

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      errorEl.textContent = '';
      okEl.textContent = '';
      submitBtn.disabled = true;

      const payload = {
        organizationName: document.getElementById('organizationName').value.trim(),
        fullName: document.getElementById('fullName').value.trim(),
        email: document.getElementById('email').value.trim(),
        password: document.getElementById('password').value,
        plan: document.getElementById('plan').value,
        source: 'public_web'
      };

      try {
        const response = await fetch('/api/public/signup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const body = await response.json().catch(() => ({}));
        if (!response.ok) {
          throw new Error(body.error || 'Signup failed');
        }

        if (body.token) {
          localStorage.setItem('opsDashboardSessionToken', body.token);
        }
        if (body.expiresAt) {
          localStorage.setItem('opsDashboardSessionExpiresAt', body.expiresAt);
        }
        if (body.agencyId) {
          localStorage.setItem('agencyId', body.agencyId);
        }

        okEl.textContent = 'Workspace created. Redirecting...';
        const target = body.redirectUrl || '/';
        setTimeout(() => { window.location.assign(target); }, 700);
      } catch (error) {
        errorEl.textContent = error.message || 'Signup failed';
      } finally {
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
