<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Operations Dashboard · Digital1010</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --glass-bg: rgba(255, 255, 255, 0.7);
      --glass-border: rgba(255, 255, 255, 0.3);
      --shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
      --text-primary: #1d1d1f;
      --text-secondary: #6e6e73;
      --accent-blue: #007aff;
      --accent-purple: #5856d6;
      --status-green: #34c759;
      --status-yellow: #ff9500;
      --status-red: #ff3b30;
      --status-gray: #8e8e93;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #f5f7fa 0%, #e8eef5 100%);
      color: var(--text-primary);
      line-height: 1.6;
      padding: 24px;
      min-height: 100vh;
    }

    .header {
      text-align: center;
      margin-bottom: 40px;
    }

    .header h1 {
      font-size: 48px;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
      background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header p {
      font-size: 18px;
      color: var(--text-secondary);
    }

    .dashboard {
      max-width: 1400px;
      margin: 0 auto;
    }

    .glass-card {
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      box-shadow: var(--shadow);
      padding: 24px;
      margin-bottom: 24px;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .glass-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.12);
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }

    .stat-card {
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      padding: 20px;
      text-align: center;
    }

    .stat-value {
      font-size: 36px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .stat-label {
      font-size: 14px;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .section-title {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .category-section {
      margin-bottom: 32px;
    }

    .category-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 2px solid rgba(0, 0, 0, 0.05);
    }

    .category-icon {
      font-size: 28px;
    }

    .category-title {
      font-size: 22px;
      font-weight: 700;
      flex: 1;
    }

    .category-count {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-secondary);
      background: rgba(0, 0, 0, 0.05);
      padding: 4px 12px;
      border-radius: 20px;
    }

    .status-subsection {
      margin-bottom: 24px;
    }

    .status-header {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 12px;
      padding-left: 8px;
      border-left: 4px solid;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .status-header.complete { border-left-color: var(--status-green); }
    .status-header.in-progress { border-left-color: var(--accent-blue); }
    .status-header.blocked { border-left-color: var(--status-red); }
    .status-header.other { border-left-color: var(--status-gray); }

    .projects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
      gap: 20px;
    }

    .project-card {
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      padding: 20px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .project-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.12);
    }

    .project-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
    }

    .project-id {
      font-size: 12px;
      font-weight: 600;
      color: var(--accent-blue);
      background: rgba(0, 122, 255, 0.1);
      padding: 4px 8px;
      border-radius: 6px;
    }

    .project-name {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 8px;
      line-height: 1.4;
    }

    .project-meta {
      display: flex;
      gap: 12px;
      margin-bottom: 12px;
      font-size: 13px;
      color: var(--text-secondary);
    }

    .progress-bar {
      width: 100%;
      height: 6px;
      background: rgba(0, 0, 0, 0.05);
      border-radius: 3px;
      overflow: hidden;
      margin-bottom: 12px;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent-blue), var(--accent-purple));
      border-radius: 3px;
      transition: width 0.3s ease;
    }

    .status-badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .status-green { background: rgba(52, 199, 89, 0.15); color: var(--status-green); }
    .status-yellow { background: rgba(255, 149, 0, 0.15); color: var(--status-yellow); }
    .status-red { background: rgba(255, 59, 48, 0.15); color: var(--status-red); }
    .status-blue { background: rgba(0, 122, 255, 0.15); color: var(--accent-blue); }
    .status-gray { background: rgba(142, 142, 147, 0.15); color: var(--status-gray); }

    .comments-section {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid rgba(0, 0, 0, 0.05);
    }

    .comment {
      background: rgba(255, 255, 255, 0.5);
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 8px;
      font-size: 13px;
    }

    .comment-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 6px;
    }

    .comment-author {
      font-weight: 600;
      color: var(--accent-blue);
    }

    .comment-time {
      font-size: 11px;
      color: var(--text-secondary);
    }

    .comment-form {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }

    .comment-input {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid rgba(0, 0, 0, 0.1);
      border-radius: 10px;
      font-size: 14px;
      background: rgba(255, 255, 255, 0.8);
      outline: none;
      transition: border-color 0.2s ease;
    }

    .comment-input:focus {
      border-color: var(--accent-blue);
    }

    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-primary {
      background: var(--accent-blue);
      color: white;
    }

    .btn-primary:hover {
      background: #0051d5;
      transform: translateY(-1px);
    }

    .activity-feed {
      max-height: 300px;
      overflow-y: auto;
    }

    .log-entry {
      background: rgba(255, 255, 255, 0.5);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
      text-decoration: none;
      color: inherit;
      display: block;
    }

    .log-entry:hover {
      background: rgba(0, 122, 255, 0.1);
      transform: translateX(4px);
      border-left: 3px solid var(--accent-blue);
    }

    .log-entry:active {
      transform: translateX(2px);
    }

    .log-date {
      font-size: 13px;
      font-weight: 700;
      color: var(--accent-blue);
      margin-bottom: 6px;
    }

    .log-summary {
      font-size: 14px;
      color: var(--text-primary);
      line-height: 1.5;
    }

    .log-size {
      font-size: 11px;
      color: var(--text-secondary);
      margin-top: 6px;
    }

    .log-search-result {
      background: rgba(255, 255, 255, 0.6);
      border-left: 3px solid var(--accent-blue);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 8px;
      font-size: 13px;
    }

    .log-search-date {
      font-weight: 600;
      color: var(--accent-blue);
      margin-bottom: 4px;
    }

    .log-search-text {
      font-family: 'SF Mono', Monaco, monospace;
      background: rgba(0, 0, 0, 0.05);
      padding: 6px 8px;
      border-radius: 4px;
      overflow-x: auto;
      white-space: nowrap;
    }

    .highlight {
      background: rgba(255, 149, 0, 0.3);
      padding: 2px 4px;
      border-radius: 2px;
      font-weight: 600;
    }

    .activity-item {
      display: flex;
      gap: 12px;
      padding: 12px;
      border-radius: 12px;
      margin-bottom: 8px;
      background: rgba(255, 255, 255, 0.5);
      font-size: 14px;
    }

    .activity-emoji {
      font-size: 20px;
    }

    .activity-content {
      flex: 1;
    }

    .activity-time {
      font-size: 12px;
      color: var(--text-secondary);
    }

    .agent-card {
      background: rgba(255, 255, 255, 0.5);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .agent-emoji {
      font-size: 32px;
    }

    .agent-info {
      flex: 1;
    }

    .agent-name {
      font-weight: 600;
      margin-bottom: 4px;
    }

    .agent-status {
      font-size: 13px;
      color: var(--text-secondary);
    }

    .filter-bar {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .filter-btn {
      padding: 8px 16px;
      border: 1px solid rgba(0, 0, 0, 0.1);
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.6);
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .filter-btn:hover, .filter-btn.active {
      background: var(--accent-blue);
      color: white;
      border-color: var(--accent-blue);
    }

    .search-box {
      flex: 1;
      min-width: 250px;
      padding: 10px 16px;
      border: 1px solid rgba(0, 0, 0, 0.1);
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.8);
      font-size: 14px;
      outline: none;
    }

    .search-box:focus {
      border-color: var(--accent-blue);
    }

    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(10px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 24px;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal-content {
      background: var(--glass-bg);
      backdrop-filter: blur(30px);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
      max-width: 800px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      padding: 32px;
      animation: modalSlideIn 0.3s ease;
    }

    @keyframes modalSlideIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid rgba(0, 0, 0, 0.05);
    }

    .modal-close {
      background: rgba(0, 0, 0, 0.05);
      border: none;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      font-size: 20px;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .modal-close:hover {
      background: rgba(0, 0, 0, 0.1);
      transform: rotate(90deg);
    }

    .modal-section {
      margin-bottom: 24px;
    }

    .modal-section-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
    }

    .deliverable-item {
      background: rgba(255, 255, 255, 0.5);
      border-radius: 12px;
      padding: 12px 16px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: all 0.2s ease;
      cursor: pointer;
    }

    .deliverable-item:hover {
      background: rgba(0, 122, 255, 0.1);
      transform: translateX(4px);
      border-left: 3px solid var(--accent-blue);
    }

    .deliverable-item:active {
      transform: translateX(2px);
      background: rgba(0, 122, 255, 0.2);
    }

    .deliverable-icon {
      font-size: 20px;
    }

    .deliverable-info {
      flex: 1;
    }

    .deliverable-name {
      font-weight: 600;
      margin-bottom: 2px;
    }

    .deliverable-type {
      font-size: 12px;
      color: var(--text-secondary);
    }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-bottom: 16px;
    }

    .info-item {
      background: rgba(255, 255, 255, 0.3);
      border-radius: 10px;
      padding: 12px;
    }

    .info-label {
      font-size: 11px;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }

    .info-value {
      font-size: 15px;
      font-weight: 600;
    }

    .detail-section {
      margin-top: 16px;
      padding: 16px;
      background: rgba(255, 255, 255, 0.3);
      border-radius: 12px;
      border-left: 3px solid;
    }

    .detail-section.rationale { border-left-color: var(--accent-purple); }
    .detail-section.risks { border-left-color: var(--status-red); }
    .detail-section.next-actions { border-left-color: var(--accent-blue); }
    .detail-section.dependencies { border-left-color: var(--status-yellow); }
    .detail-section.metrics { border-left-color: var(--status-green); }

    .detail-section-title {
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .detail-section-content {
      font-size: 14px;
      line-height: 1.6;
    }

    .risk-item {
      background: rgba(255, 59, 48, 0.05);
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 8px;
    }

    .risk-severity {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .risk-severity.low { background: rgba(52, 199, 89, 0.2); color: var(--status-green); }
    .risk-severity.moderate { background: rgba(255, 149, 0, 0.2); color: var(--status-yellow); }
    .risk-severity.high { background: rgba(255, 59, 48, 0.2); color: var(--status-red); }

    .risk-description {
      font-size: 13px;
      margin-bottom: 6px;
      font-weight: 600;
    }

    .risk-mitigation {
      font-size: 12px;
      color: var(--text-secondary);
    }

    .next-action-item {
      padding: 8px 12px;
      background: rgba(0, 122, 255, 0.05);
      border-radius: 8px;
      margin-bottom: 6px;
      font-size: 13px;
      display: flex;
      align-items: start;
      gap: 8px;
    }

    .dependency-item {
      padding: 8px 12px;
      background: rgba(255, 149, 0, 0.05);
      border-radius: 8px;
      margin-bottom: 6px;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .dependency-item:hover {
      background: rgba(255, 149, 0, 0.15);
      transform: translateX(2px);
    }

    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 10px;
    }

    .metric-item {
      background: rgba(255, 255, 255, 0.5);
      border-radius: 8px;
      padding: 10px;
      text-align: center;
    }

    .metric-value {
      font-size: 18px;
      font-weight: 700;
      color: var(--accent-blue);
      margin-bottom: 4px;
    }

    .metric-label {
      font-size: 11px;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    @media (max-width: 768px) {
      .projects-grid {
        grid-template-columns: 1fr;
      }
      
      .stats-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .header h1 {
        font-size: 32px;
      }

      .modal-content {
        padding: 24px;
        max-height: 95vh;
      }

      .info-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Operations Dashboard</h1>
    <p>Real-time project tracking for Digital1010</p>
  </div>

  <div class="dashboard">
    <div class="stats-grid" id="statsGrid"></div>

    <div class="glass-card">
      <div class="section-title">🎯 Projects</div>
      <div class="filter-bar">
        <input type="text" class="search-box" id="searchBox" placeholder="Search projects...">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="in-progress">In Progress</button>
        <button class="filter-btn" data-filter="complete">Complete</button>
        <button class="filter-btn" data-filter="blocked">Blocked</button>
      </div>
      <div id="projectsContainer"></div>
    </div>

    <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 24px;">
      <div class="glass-card">
        <div class="section-title">📓 Daily Log</div>
        <div style="margin-bottom: 16px;">
          <input type="text" class="search-box" id="logSearchBox" placeholder="Search logs for project mentions..." style="width: 100%;">
        </div>
        <div id="dailyLog" style="max-height: 500px; overflow-y: auto;"></div>
      </div>

      <div>
        <div class="glass-card" style="margin-bottom: 24px;">
          <div class="section-title">📡 Activity Feed</div>
          <div class="activity-feed" id="activityFeed"></div>
        </div>

        <div class="glass-card">
          <div class="section-title">🤖 Agents</div>
          <div id="agentsGrid"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal -->
  <div class="modal-overlay" id="projectModal" onclick="closeModalOnOverlay(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
      <div class="modal-header">
        <div>
          <div id="modalProjectId" class="project-id" style="margin-bottom: 12px;"></div>
          <h2 id="modalProjectName" style="font-size: 24px; font-weight: 700; margin: 0;"></h2>
        </div>
        <button class="modal-close" onclick="closeModal()">×</button>
      </div>

      <div class="info-grid">
        <div class="info-item">
          <div class="info-label">Owner</div>
          <div class="info-value" id="modalOwner"></div>
        </div>
        <div class="info-item">
          <div class="info-label">Priority</div>
          <div class="info-value" id="modalPriority"></div>
        </div>
        <div class="info-item">
          <div class="info-label">Status</div>
          <div id="modalStatus"></div>
        </div>
        <div class="info-item">
          <div class="info-label">Progress</div>
          <div class="info-value" id="modalProgress"></div>
        </div>
      </div>

      <div class="modal-section" id="modalNotesSection" style="display: none;">
        <div class="modal-section-title">📝 Notes</div>
        <div id="modalNotes" style="background: rgba(255, 255, 255, 0.3); padding: 12px; border-radius: 10px; font-size: 14px;"></div>
      </div>

      <div class="modal-section" id="modalBlockersSection" style="display: none;">
        <div class="modal-section-title">🚫 Blockers</div>
        <div id="modalBlockers"></div>
      </div>

      <div id="modalRationaleSection"></div>
      <div id="modalRisksSection"></div>
      <div id="modalDependenciesSection"></div>
      <div id="modalNextActionsSection"></div>
      <div id="modalMetricsSection"></div>

      <div class="modal-section" id="modalDeliverablesSection">
        <div class="modal-section-title">📦 Deliverables</div>
        <div id="modalDeliverables"></div>
      </div>

      <div class="modal-section">
        <div class="modal-section-title">💬 Comments (<span id="modalCommentCount">0</span>)</div>
        <div id="modalComments"></div>
        <div class="comment-form" style="margin-top: 16px;">
          <input type="text" class="comment-input" id="modalCommentInput" placeholder="Add a comment...">
          <button class="btn btn-primary" onclick="addCommentFromModal()">Send</button>
        </div>
      </div>

      <div style="font-size: 12px; color: var(--text-secondary); text-align: center; margin-top: 16px;">
        Last updated: <span id="modalLastUpdated"></span>
      </div>

      <div style="display: flex; gap: 12px; margin-top: 24px; padding-top: 16px; border-top: 1px solid rgba(0, 0, 0, 0.05);">
        <button class="btn" style="flex: 1; background: var(--status-green); color: white;" onclick="approveProject()">✓ Approve</button>
        <button class="btn" style="flex: 1; background: var(--status-red); color: white;" onclick="rejectProject()">✗ Reject</button>
        <button class="btn" style="flex: 1; background: var(--status-yellow); color: white;" onclick="requestChanges()">↻ Request Changes</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
