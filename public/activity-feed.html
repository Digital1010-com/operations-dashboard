<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activity Feed - D1010 Operations Dashboard</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #111827;
            color: #f3f4f6;
            height: 100vh;
            overflow: hidden;
        }

        /* Navigation */
        .nav {
            background: #1f2937;
            border-bottom: 1px solid #374151;
            padding: 0 40px;
        }

        .nav-container {
            display: flex;
            gap: 32px;
        }

        .nav-item {
            padding: 20px 0;
            font-size: 16px;
            font-weight: 500;
            color: #9ca3af;
            text-decoration: none;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
        }

        .nav-item:hover {
            color: #f3f4f6;
        }

        .nav-item.active {
            color: #3b82f6;
            border-bottom-color: #3b82f6;
        }

        /* Activity Feed Container */
        .activity-container {
            padding: 40px;
            height: calc(100vh - 61px);
            overflow-y: auto;
        }

        .activity-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
        }

        .activity-title {
            font-size: 32px;
            font-weight: 700;
        }

        .activity-controls {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .activity-btn {
            padding: 8px 16px;
            background: #1f2937;
            border: 1px solid #374151;
            border-radius: 8px;
            color: #f3f4f6;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .activity-btn:hover {
            background: #374151;
        }

        .activity-btn.active {
            background: #3b82f6;
            border-color: #3b82f6;
        }

        .activity-filter {
            padding: 8px 16px;
            background: #1f2937;
            border: 1px solid #374151;
            border-radius: 8px;
            color: #f3f4f6;
            font-size: 14px;
            min-width: 150px;
        }

        /* Activity Feed */
        .activity-feed {
            background: #1f2937;
            border-radius: 12px;
            padding: 24px;
            height: calc(100% - 100px);
            overflow-y: auto;
        }

        .activity-timeline {
            position: relative;
            padding-left: 40px;
        }

        .activity-timeline::before {
            content: '';
            position: absolute;
            left: 20px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: #374151;
        }

        .activity-item {
            position: relative;
            margin-bottom: 24px;
            padding: 20px;
            background: #111827;
            border-radius: 8px;
            border-left: 4px solid #3b82f6;
            transition: all 0.2s;
        }

        .activity-item:hover {
            background: #1a2231;
            transform: translateX(4px);
        }

        .activity-item::before {
            content: '';
            position: absolute;
            left: -30px;
            top: 24px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #3b82f6;
            border: 2px solid #111827;
        }

        .activity-item.p0 {
            border-left-color: #ef4444;
        }

        .activity-item.p0::before {
            background: #ef4444;
        }

        .activity-item.p1 {
            border-left-color: #f59e0b;
        }

        .activity-item.p1::before {
            background: #f59e0b;
        }

        .activity-item.financial {
            border-left-color: #10b981;
        }

        .activity-item.financial::before {
            background: #10b981;
        }

        .activity-item.comment {
            border-left-color: #8b5cf6;
        }

        .activity-item.comment::before {
            background: #8b5cf6;
        }

        .activity-item.system {
            border-left-color: #6b7280;
        }

        .activity-item.system::before {
            background: #6b7280;
        }

        .activity-header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .activity-agent {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            font-size: 14px;
        }

        .activity-agent-avatar {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #3b82f6;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 600;
            color: white;
        }

        .activity-time {
            font-size: 12px;
            color: #9ca3af;
        }

        .activity-action {
            font-size: 16px;
            margin-bottom: 8px;
            line-height: 1.5;
        }

        .activity-target {
            font-weight: 600;
            color: #3b82f6;
            cursor: pointer;
        }

        .activity-target:hover {
            text-decoration: underline;
        }

        .activity-details {
            font-size: 14px;
            color: #9ca3af;
            margin-top: 8px;
            padding: 12px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 6px;
        }

        .activity-details-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 12px;
            margin-top: 8px;
        }

        .detail-item {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .detail-item:last-child {
            border-bottom: none;
        }

        .detail-label {
            font-size: 12px;
            color: #6b7280;
        }

        .detail-value {
            font-size: 14px;
            font-weight: 500;
        }

        .detail-value.positive {
            color: #10b981;
        }

        .detail-value.negative {
            color: #ef4444;
        }

        .activity-search {
            padding: 12px 16px;
            background: #111827;
            border: 1px solid #374151;
            border-radius: 8px;
            color: #f3f4f6;
            font-size: 14px;
            width: 300px;
            margin-bottom: 24px;
        }

        .activity-search:focus {
            outline: none;
            border-color: #3b82f6;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #9ca3af;
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .empty-state-text {
            font-size: 16px;
        }

        /* Live indicator */
        .live-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: #10b981;
            margin-bottom: 16px;
        }

        .live-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #10b981;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        /* Stats */
        .activity-stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: #1f2937;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .stat-label {
            font-size: 12px;
            color: #9ca3af;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .stat-value.agents {
            color: #3b82f6;
        }

        .stat-value.projects {
            color: #10b981;
        }

        .stat-value.financial {
            color: #f59e0b;
        }

        .stat-value.comments {
            color: #8b5cf6;
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="nav">
        <div class="nav-container">
            <a href="/" class="nav-item">Dashboard</a>
            <a href="/mission-control.html" class="nav-item">Mission Control</a>
            <a href="/calendar.html" class="nav-item">Calendar</a>
            <a href="/activity-feed.html" class="nav-item active">Activity Feed</a>
            <a href="/files.html" class="nav-item">Files</a>
        </div>
    </nav>

    <!-- Activity Feed Container -->
    <div class="activity-container">
        <div class="activity-header">
            <h1 class="activity-title">Activity Feed</h1>
            <div class="activity-controls">
                <select class="activity-filter" id="filterType">
                    <option value="all">All Activities</option>
                    <option value="financial">Financial Updates</option>
                    <option value="comment">Comments</option>
                    <option value="project">Project Changes</option>
                    <option value="system">System Events</option>
                </select>
                <select class="activity-filter" id="filterAgent">
                    <option value="all">All Agents</option>
                    <option value="Otto">Otto</option>
                    <option value="Joan">Joan</option>
                    <option value="Dashboard">Dashboard</option>
                    <option value="System">System</option>
                </select>
                <button class="activity-btn" onclick="refreshFeed()">Refresh</button>
                <button class="activity-btn" onclick="exportFeed()">Export</button>
            </div>
        </div>

        <!-- Stats -->
        <div class="activity-stats">
            <div class="stat-card">
                <div class="stat-value agents" id="statAgents">0</div>
                <div class="stat-label">Active Agents</div>
            </div>
            <div class="stat-card">
                <div class="stat-value projects" id="statProjects">0</div>
                <div class="stat-label">Projects Today</div>
            </div>
            <div class="stat-card">
                <div class="stat-value financial" id="statFinancial">$0</div>
                <div class="stat-label">Revenue Today</div>
            </div>
            <div class="stat-card">
                <div class="stat-value comments" id="statComments">0</div>
                <div class="stat-label">Comments Today</div>
            </div>
        </div>

        <!-- Live Indicator -->
        <div class="live-indicator">
            <div class="live-dot"></div>
            <span>Live Activity Feed - Updates in real-time</span>
        </div>

        <!-- Search -->
        <input type="text" class="activity-search" id="searchBox" placeholder="Search activities..." oninput="searchActivities()">

        <!-- Activity Feed -->
        <div class="activity-feed">
            <div class="activity-timeline" id="activityTimeline">
                <div class="empty-state" id="emptyState">
                    <div class="empty-state-icon">📊</div>
                    <div class="empty-state-text">Loading activities...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let activities = [];
        let ws = null;
        let currentFilter = 'all';
        let currentAgent = 'all';
        let searchQuery = '';

        // Initialize
        document.addEventListener('DOMContentLoaded', async function() {
            await loadActivities();
            connectWebSocket();
            setupEventListeners();
            updateStats();
        });

        // Load activities from API
        async function loadActivities() {
            try {
                const response = await fetch('/api/data');
                const data = await response.json();
                activities = data.activityFeed || [];
                renderActivities();
            } catch (error) {
                console.error('Error loading activities:', error);
                showNotification('Error loading activities', 'error');
            }
        }

        // Connect WebSocket for real-time updates
        function connectWebSocket() {
            ws = new WebSocket(`ws://${window.location.host}`);
            
            ws.onmessage = (event) => {
                const message = JSON.parse(event.data);
                if (message.type === 'update') {
                    // New activity added
                    loadActivities();
                    updateStats();
                }
            };

            ws.onclose = () => {
                console.log('WebSocket disconnected, reconnecting...');
                setTimeout(connectWebSocket, 3000);
            };
        }

        // Setup event listeners
        function setupEventListeners() {
            document.getElementById('filterType').addEventListener('change', (e) => {
                currentFilter = e.target.value;
                renderActivities();
            });

            document.getElementById('filterAgent').addEventListener('change', (e) => {
                currentAgent = e.target.value;
                renderActivities();
            });
        }

        // Search activities
        function searchActivities() {
            searchQuery = document.getElementById('searchBox').value.toLowerCase();
            renderActivities();
        }

        // Render activities
        function renderActivities() {
            let filteredActivities = activities;

            // Apply type filter
            if (currentFilter !== 'all') {
                filteredActivities = filteredActivities.filter(a => a.type === currentFilter);
            }

            // Apply agent filter
            if (currentAgent !== 'all') {
                filteredActivities = filteredActivities.filter(a => a.agent === currentAgent);
            }

            // Apply search
            if (searchQuery) {
                filteredActivities = filteredActivities.filter(a => 
                    (a.target && a.target.toLowerCase().includes(searchQuery)) ||
                    (a.agent && a.agent.toLowerCase().includes(searchQuery)) ||
                    (a.action && a.action.toLowerCase().includes(searchQuery)) ||
                    (a.details && JSON.stringify(a.details).toLowerCase().includes(searchQuery))
                );
            }

            const container = document.getElementById('activityTimeline');
            
            if (filteredActivities.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">🔍</div>
                        <div class="empty-state-text">No activities found</div>
                    </div>
                `;
                return;
            }

            container.innerHTML = filteredActivities.map(activity => {
                // Determine activity class
                let activityClass = '';
                if (activity.type === 'financial') activityClass = 'financial';
                else if (activity.type === 'comment') activityClass = 'comment';
                else if (activity.type === 'system') activityClass = 'system';
                else if (activity.priority === 'P0') activityClass = 'p0';
                else if (activity.priority === 'P1') activityClass = 'p1';

                // Format time
                const time = new Date(activity.timestamp);
                const timeStr = time.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                const dateStr = time.toLocaleDateString();

                // Get agent avatar
                const agentAvatar = activity.agent ? activity.agent.charAt(0).toUpperCase() : '?';

                // Render details if available
                let detailsHtml = '';
                if (activity.details) {
                    if (activity.type === 'financial') {
                        detailsHtml = `
                            <div class="activity-details">
                                <div class="activity-details-grid">
                                    ${activity.details.hours ? `
                                        <div class="detail-item">
                                            <span class="detail-label">Hours</span>
                                            <span class="detail-value">${activity.details.hours}</span>
                                        </div>
                                    ` : ''}
                                    ${activity.details.rate ? `
                                        <div class="detail-item">
                                            <span class="detail-label">Rate</span>
                                            <span class="detail-value">$${activity.details.rate}</span>
                                        </div>
                                    ` : ''}
                                    ${activity.details.revenue ? `
                                        <div class="detail-item">
                                            <span class="detail-label">Revenue</span>
                                            <span class="detail-value positive">$${activity.details.revenue}</span>
                                        </div>
                                    ` : ''}
                                    ${activity.details.profit !== undefined ? `
                                        <div class="detail-item">
                                            <span class="detail-label">Profit</span>
                                            <span class="detail-value ${activity.details.profit >= 0 ? 'positive' : 'negative'}">
                                                $${
