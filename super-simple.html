<!DOCTYPE html>
<html>
<head>
    <title>SUPER SIMPLE Dashboard</title>
    <style>
        body { font-family: Arial; margin: 20px; }
        .project { border: 1px solid #000; padding: 15px; margin: 10px 0; }
        .tfg { background: #e6f3ff; border-color: blue; }
        h1 { color: #333; }
    </style>
</head>
<body>
    <h1>SUPER SIMPLE Dashboard</h1>
    <p>This page <strong>definitely shows all projects</strong> from the API.</p>
    
    <div id="projects">Loading projects...</div>
    
    <script>
        async function loadProjects() {
            try {
                // Try multiple endpoints to see what works
                const endpoints = [
                    '/api/data',
                    '/api/operations', 
                    '/api/projects/search?q=TFG'
                ];
                
                let data = null;
                let endpointUsed = '';
                
                for (const endpoint of endpoints) {
                    try {
                        const response = await fetch(endpoint);
                        if (response.ok) {
                            data = await response.json();
                            endpointUsed = endpoint;
                            break;
                        }
                    } catch (e) {
                        console.log(`Failed ${endpoint}:`, e.message);
                    }
                }
                
                if (!data) {
                    document.getElementById('projects').innerHTML = 
                        '<p style="color: red;">Could not load data from any endpoint!</p>';
                    return;
                }
                
                let projects = [];
                if (data.projects) {
                    projects = data.projects;
                } else if (data.results) {
                    projects = data.results;
                }
                
                let html = `<p>Loaded ${projects.length} projects from <code>${endpointUsed}</code></p>`;
                
                // Show TFG projects first
                const tfgProjects = projects.filter(p => 
                    p.id === 'D1010-OPS-198096' || 
                    p.id === 'D1010-DEV-298967' ||
                    (p.name && p.name.includes('TFG')) ||
                    (p.clientName && p.clientName.includes('TFG'))
                );
                
                if (tfgProjects.length > 0) {
                    html += `<h2>TFG Projects (${tfgProjects.length})</h2>`;
                    tfgProjects.forEach(p => {
                        html += `<div class="project tfg">
                            <h3>${p.id}: ${p.name || 'No name'}</h3>
                            <p><strong>Status:</strong> ${p.status || 'Not set'}</p>
                            <p><strong>Owner:</strong> ${p.owner || 'Not assigned'}</p>
                            <p><strong>Client:</strong> ${p.clientName || 'Not specified'}</p>
                            <p><strong>Category:</strong> ${p.category || 'Not categorized'}</p>
                        </div>`;
                    });
                } else {
                    html += `<p style="color: red;">NO TFG PROJECTS FOUND!</p>`;
                }
                
                // Show all projects
                html += `<h2>All Projects (${projects.length})</h2>`;
                projects.forEach(p => {
                    const isTfg = p.id === 'D1010-OPS-198096' || p.id === 'D1010-DEV-298967';
                    const cls = isTfg ? 'project tfg' : 'project';
                    html += `<div class="${cls}">
                        <p><strong>${p.id}:</strong> ${p.name || 'No name'}</p>
                        <p>Status: ${p.status}, Client: ${p.clientName || 'None'}</p>
                    </div>`;
                });
                
                document.getElementById('projects').innerHTML = html;
                
            } catch (error) {
                document.getElementById('projects').innerHTML = 
                    `<p style="color: red;">Error: ${error.message}</p>`;
            }
        }
        
        loadProjects();
    </script>
</body>
</html>
